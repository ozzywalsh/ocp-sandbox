apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-api
  namespace: sandbox
spec:
  replicas: 1
  selector:
    matchLabels:
      app: todo-api
  template:
    metadata:
      labels:
        app: todo-api
    spec:
      containers:
        - name: todo-api
          image: image-registry.openshift-image-registry.svc:5000/sandbox/todo-api:latest
          ports:
            - name: http
              containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: todo-api
  namespace: sandbox
  labels:
    app: todo-api
spec:
  selector:
    app: todo-api
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: todo-api
  namespace: sandbox
spec:
  selector:
    matchLabels:
      app: todo-api
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: todo-api
  namespace: sandbox
spec:
  to:
    kind: Service
    name: todo-api
  port:
    targetPort: http
