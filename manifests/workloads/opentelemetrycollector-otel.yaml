apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: otel
  namespace: sandbox
spec:
  mode: deployment # deployment, daemonset, statefulset, sidecar
  config:
    receivers:
      prometheus:
        config:
          scrape_configs:
            - job_name: 'otel-collector-scrape-todo'
              static_configs:
                - targets: ['todo-api.sandbox.svc:8080']
      otlp:
        protocols:
          grpc: {}
          http: {}
      zipkin: {}
    processors:
      batch: {}
      memory_limiter:
        check_interval: 1s
        limit_percentage: 50
        spike_limit_percentage: 30
      k8sattributes:
        auth_type: "serviceAccount"
        passthrough: false
        extract:
          metadata:
            - k8s.pod.name
            - k8s.namespace.name
            - k8s.deployment.name
      attributes:
        actions:
          - key: "scraped_by"
            value: "otel-collector-ozwalsh"
            action: insert
    extensions:
      bearertokenauth:
        filename: /var/run/secrets/kubernetes.io/serviceaccount/token
    exporters:
      debug:
        verbosity: basic
      otlphttp/loki:
        endpoint: https://logging-loki-gateway-http.openshift-logging.svc:8080/api/logs/v1/application/otlp
        tls:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/service-ca.crt
        auth:
          authenticator: bearertokenauth
      otlp/tempo:
        endpoint: tempo-tracing-system-tempo-stack-gateway.tracing-system.svc:4317
        tls:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/service-ca.crt
        headers:
          X-Scope-OrgID: dev
        auth:
          authenticator: bearertokenauth
      prometheus:
        endpoint: "0.0.0.0:8889"
    service:
      extensions: [bearertokenauth]
      pipelines:
        logs:
          receivers: [otlp]
          processors: [k8sattributes, memory_limiter, batch]
          exporters: [otlphttp/loki, debug]
        metrics:
          receivers: [prometheus, otlp]
          processors: [k8sattributes, attributes, memory_limiter, batch]
          exporters: [prometheus, debug]
        traces:
          receivers: [otlp, zipkin]
          processors: [memory_limiter, batch]
          exporters: [otlp/tempo, debug]
