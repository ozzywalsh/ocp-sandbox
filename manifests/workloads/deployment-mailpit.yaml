apiVersion: apps/v1
kind: Deployment
metadata:
  name: mailpit
  namespace: sandbox
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mailpit
  template:
    metadata:
      labels:
        app: mailpit
    spec:
      containers:
        - name: mailpit
          image: docker.io/axllent/mailpit:latest
          ports:
            - name: smtp
              containerPort: 1025
            - name: http
              containerPort: 8025
---
apiVersion: v1
kind: Service
metadata:
  name: mailpit
  namespace: sandbox
spec:
  selector:
    app: mailpit
  ports:
    - name: smtp
      port: 1025
      targetPort: 1025
    - name: http
      port: 8025
      targetPort: 8025
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: mailpit
  namespace: sandbox
spec:
  to:
    kind: Service
    name: mailpit
  port:
    targetPort: http
