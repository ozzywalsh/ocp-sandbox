global:
  http_config:
    proxy_from_environment: true
  smtp_smarthost: mailpit.sandbox.svc:1025
  smtp_from: alertmanager@sandbox.local
  smtp_require_tls: false
inhibit_rules:
  - equal:
      - namespace
      - alertname
    source_matchers:
      - "severity = critical"
    target_matchers:
      - "severity =~ warning|info"
  - equal:
      - namespace
      - alertname
    source_matchers:
      - "severity = warning"
    target_matchers:
      - "severity = info"
receivers:
  - name: Default
  - name: Watchdog
  - name: Critical
  - name: email
    email_configs:
      - to: alerts@sandbox.local
        send_resolved: true
route:
  group_by:
    - namespace
  group_interval: 5m
  group_wait: 30s
  receiver: Default
  repeat_interval: 12h
  routes:
    - matchers:
        - "alertname = Watchdog"
      receiver: Watchdog
    - matchers:
        - "severity = critical"
      receiver: email
